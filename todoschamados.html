<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDesk</title>
    <meta name="description" content="Sistema para gerenciar chamados.">
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./css/todoschamados.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>EasyDesk</h1>
        </div>

        <nav>
            <input type="checkbox" id="check">
                <label for="check">&#x2630;</label>
            <ul id="nav">
                <li><a href="resumo.html">Resumo</a></li>
                <li><a href="form.html">Novo chamado</a></li>
                <li><a href="index.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Todos chamados</h2>        
    </main>

    <section id="filtro-chamados">
        <h3>Filtros</h3>

        <label for="filtro_id">ID:</label>
        <input type="text" name="filtro_id" id="filtro_id">

        <label for="filtro_solicitante">Solicitante:</label>
        <input type="text" name="filtro_solicitante" id="filtro_solicitante">

        <label for="prioridade">Prioridade:</label>
        <select name="prioridade" id="prioridade">
            <option value="">Todas</option>
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
        </select>   
        
        <label for="complexidade">Complexidade:</label>
        <select name="complexidade" id="complexidade">
            <option value="">Todas</option>
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
        </select>
        
        <label for="status">Status:</label>
        <select name="status" id="status">
            <option value="">Todos</option>
            <option value="aberto">Aberto</option>
            <option value="atendimento">Em Atendimento</option>
            <option value="cancelado">Cancelado</option>
            <option value="fechado">Fechado</option>
        </select>

        <button id="filtrar_btn">Aplicar filtros</button>
        <button id="limpar_btn">Limpar filtros</button>

    </section>

    <section id="todos-chamados">
        <div class="cards-chamados"></div>
    </section>

    <dialog id="modal-chamado">
        <div id="modal-content"></div>
    </dialog>

    <script type="module" src="./js/todoschamados.js"></script>

</body>
</html>
