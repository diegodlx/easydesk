<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyDesk</title>
    <meta name="description" content="Sistema para gerenciar chamados.">
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>EasyDesk</h1>
        </div>

    </header>
    <main>
        <h2>Bem-vindo ao EasyDesk</h2>
    </main>

    <section id="credenciais">
        <form action="" method="post" id="login-form">
            <label for="user">Login:</label>
            <select name="user" id="user">
                <option value="../html/resumo.html">Usuário</option>
                <option value="../html/classificar.html">Suporte</option>
                <option value="../html/todoschamados.html">Gestor</option>
            </select>
    
            <button id="login-button" type="submit">Entrar</button>
        </form>
    </section>

    <section>
        <button id="incluir" type="button">Incluir Dados</button>
        <button id="clear" type="button">Limpar Dados</button>
    </section>

    <script type="module" src="../js/index.js"></script>

</body>
</html>
